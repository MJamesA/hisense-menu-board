<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hisense Digital Menu Board</title>

<!-- ===== Google Font (the only font dependency) ===== -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

<style>
  /* ============================================================
     CONFIG NOTE: behavioural knobs (PRODUCTS_PER_PAGE, PAGE_SECONDS,
     CSV_URL, etc.) live in the <script> CONFIG block near the bottom.
     ============================================================ */

  :root {
    --bg:        #060d0e;   /* near-black with a faint teal tint */
    --bg-2:      #0a1518;
    --bar:       #0c1719;   /* dark header / footer bars */
    --bar-edge:  #14282b;
    --teal:      #18c7b6;   /* accent: badges, headers, checkmarks */
    --teal-deep: #0e8f83;
    --yellow:    #ffd21e;   /* category name in header */
    --red:       #ff3b3b;   /* sale prices, save badge */
    --cream:     #f6f1e3;   /* product cards */
    --cream-2:   #efe7d3;
    --ink:       #14110a;   /* dark text on cream */
    --muted:     #8a8270;   /* muted text on cream */
    --muted-d:   #5d6f72;   /* muted text on dark */
    --white:     #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Archivo', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Viewport: centres + scales the fixed stage ===== */
  #viewport {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(120% 90% at 50% -10%, #0c1c1f 0%, var(--bg) 55%, #03080a 100%);
  }

  /* ===== The fixed 1920x1080 stage (scaled via transform) ===== */
  #stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    flex: none;                /* never shrink in the centering flex viewport — scale via transform */
    transform-origin: center center;
    overflow: hidden;
    background:
      radial-gradient(130% 100% at 50% 0%, #0d1e21 0%, var(--bg) 60%, #04090b 100%);
  }

  /* ===== Safe area (~4% inset for TV overscan) ===== */
  #safe {
    position: absolute;
    inset: 4%;                 /* ~76.8px top/bottom, 76.8px sides */
    display: flex;
    flex-direction: column;
  }

  /* ===== Pages live here. Crossfade between them. ===== */
  .page {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transition: opacity 0.7s ease;
    pointer-events: none;
  }
  .page.is-active { opacity: 1; }

  /* ============================================================
     HEADER BAR
     ============================================================ */
  .header {
    flex: 0 0 auto;
    height: 132px;
    background: linear-gradient(180deg, var(--bar) 0%, #081012 100%);
    border: 2px solid var(--bar-edge);
    border-radius: 18px;
    display: flex;
    align-items: center;
    padding: 0 38px;
    gap: 34px;
  }

  .wordmark {
    font-family: 'Anton', sans-serif;
    font-size: 58px;
    letter-spacing: 1px;
    color: var(--white);
    line-height: 1;
    text-transform: uppercase;
    flex: 0 0 auto;
  }
  .wordmark .dot { color: var(--teal); }

  .header-divider {
    width: 3px;
    height: 70px;
    background: linear-gradient(180deg, transparent, var(--teal-deep), transparent);
    flex: 0 0 auto;
  }

  .category-name {
    font-family: 'Anton', sans-serif;
    font-size: 72px;
    line-height: 1;
    color: var(--yellow);
    text-transform: uppercase;
    letter-spacing: 1px;
    flex: 1 1 auto;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .header-meta {
    flex: 0 0 auto;
    text-align: right;
    line-height: 1.25;
  }
  .header-meta .m1 {
    font-family: 'Anton', sans-serif;
    font-size: 30px;
    color: var(--teal);
    letter-spacing: 1px;
  }
  .header-meta .m2 {
    font-size: 19px;
    font-weight: 700;
    color: var(--muted-d);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* ============================================================
     PRODUCT GRID
     ============================================================ */
  .grid-wrap {
    flex: 1 1 auto;
    margin: 26px 0;
    display: flex;
  }
  .grid {
    flex: 1 1 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-auto-rows: 1fr;
    gap: 22px 26px;
  }

  .card {
    background: linear-gradient(180deg, var(--cream) 0%, #ece3cf 100%);
    border-radius: 16px;
    display: flex;
    align-items: center;
    padding: 0 30px 0 26px;
    gap: 24px;
    box-shadow: 0 6px 0 rgba(0,0,0,0.28), inset 0 2px 0 rgba(255,255,255,0.5);
    min-height: 0;
  }

  .rank {
    flex: 0 0 auto;
    width: 78px;
    height: 78px;
    border-radius: 14px;
    background: linear-gradient(180deg, var(--teal) 0%, var(--teal-deep) 100%);
    color: #04201d;
    font-family: 'Anton', sans-serif;
    font-size: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.35);
  }

  .card-body {
    flex: 1 1 auto;
    min-width: 0;
  }
  .card-name {
    font-weight: 900;
    font-size: 36px;
    line-height: 1.05;
    color: var(--ink);
    text-transform: uppercase;
    letter-spacing: 0.2px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .card-model {
    margin-top: 6px;
    font-size: 21px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .price-block {
    flex: 0 0 auto;
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: center;
    line-height: 1;
  }
  .price-was {
    font-size: 26px;
    font-weight: 700;
    color: var(--muted);
    text-decoration: line-through;
    margin-bottom: 4px;
  }
  .price-now {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 50px;
    color: var(--ink);
    white-space: nowrap;
  }
  .price-now.is-sale { color: var(--red); }
  .price-now .cur { font-size: 30px; font-weight: 800; vertical-align: 6px; margin-right: 2px; }

  /* ============================================================
     FOOTER STRIP
     ============================================================ */
  .footer {
    flex: 0 0 auto;
    height: 84px;
    background: linear-gradient(180deg, #081012 0%, var(--bar) 100%);
    border: 2px solid var(--bar-edge);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 36px;
  }
  .footer .progress {
    font-family: 'Anton', sans-serif;
    font-size: 32px;
    letter-spacing: 1px;
    color: var(--teal);
    text-transform: uppercase;
  }
  .footer .progress b { color: var(--white); }
  .footer .terms {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--muted-d);
    text-transform: uppercase;
  }

  /* ============================================================
     SPOTLIGHT / FEATURED DEAL PAGE
     ============================================================ */
  .spot {
    flex: 1 1 auto;
    margin: 26px 0;
    display: grid;
    grid-template-columns: 1fr 1.05fr;
    gap: 40px;
  }
  .spot-visual {
    background:
      radial-gradient(80% 70% at 50% 35%, #15323a 0%, #0a1a1e 70%, #071214 100%);
    border: 2px solid var(--bar-edge);
    border-radius: 22px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .spot-visual .ghost {
    font-family: 'Anton', sans-serif;
    font-size: 150px;
    color: rgba(24,199,182,0.12);
    text-transform: uppercase;
    letter-spacing: 4px;
    text-align: center;
    line-height: 0.95;
    padding: 0 30px;
  }
  .spot-tag {
    position: absolute;
    top: 26px;
    left: 26px;
    background: var(--teal);
    color: #04201d;
    font-family: 'Anton', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    padding: 10px 20px;
    border-radius: 10px;
    text-transform: uppercase;
  }

  .spot-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-right: 10px;
  }
  .spot-name {
    font-family: 'Anton', sans-serif;
    font-size: 76px;
    line-height: 0.98;
    color: var(--white);
    text-transform: uppercase;
  }
  .spot-model {
    margin-top: 10px;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--teal);
    text-transform: uppercase;
  }
  .spot-features {
    margin: 30px 0 34px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .spot-feature {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    font-size: 30px;
    font-weight: 700;
    color: #e8eef0;
    line-height: 1.15;
  }
  .spot-feature .check {
    flex: 0 0 auto;
    width: 40px;
    height: 40px;
    border-radius: 9px;
    background: rgba(24,199,182,0.16);
    border: 2px solid var(--teal);
    color: var(--teal);
    font-size: 24px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }
  .spot-price-row {
    display: flex;
    align-items: flex-end;
    gap: 28px;
    flex-wrap: wrap;
  }
  .spot-was {
    font-size: 40px;
    font-weight: 800;
    color: var(--muted-d);
    text-decoration: line-through;
    padding-bottom: 12px;
  }
  .spot-now {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 120px;
    line-height: 0.85;
    color: var(--red);
    white-space: nowrap;
  }
  .spot-now .cur { font-size: 60px; vertical-align: 22px; margin-right: 4px; }
  .spot-save {
    margin-top: 22px;
    align-self: flex-start;
    background: var(--red);
    color: var(--white);
    font-family: 'Anton', sans-serif;
    font-size: 40px;
    letter-spacing: 1px;
    padding: 12px 26px;
    border-radius: 12px;
    text-transform: uppercase;
    box-shadow: 0 6px 0 rgba(0,0,0,0.3);
  }

  /* ============================================================
     LOADING + ERROR overlays
     ============================================================ */
  #loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    background:
      radial-gradient(120% 90% at 50% 30%, #0d1e21 0%, var(--bg) 70%);
    z-index: 20;
  }
  #loading .lm {
    font-family: 'Anton', sans-serif;
    font-size: 60px;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  #loading .lm .dot { color: var(--teal); }
  #loading .sub {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--muted-d);
    text-transform: uppercase;
  }
  .spinner {
    width: 64px; height: 64px;
    border: 6px solid rgba(24,199,182,0.2);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading.hide { opacity: 0; pointer-events: none; transition: opacity 0.6s ease; }

  /* small status pill (data refresh / error), bottom-left, subtle */
  #status {
    position: absolute;
    left: 10px;
    bottom: 8px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.18);
    text-transform: uppercase;
    z-index: 30;
    pointer-events: none;
  }
  #status.warn { color: rgba(255,200,40,0.55); }
</style>
</head>
<body>

<div id="viewport">
  <div id="stage">
    <div id="safe">
      <!-- pages injected here -->
    </div>

    <div id="loading">
      <div class="spinner"></div>
      <div class="lm">Hisense<span class="dot">.</span></div>
      <div class="sub">Loading today&rsquo;s deals&hellip;</div>
    </div>

    <div id="status"></div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG  — edit these values
   ============================================================ */
const CONFIG = {
  // Public JSON feed. An Apps Script timer mirrors the live price-tags
  // sheet to this file in GitHub; the no-login shop TVs read it directly.
  // (Same repo that hosts this page — kept absolute so it also works if
  //  you open index.html from anywhere.)
  DATA_URL: "https://raw.githubusercontent.com/MJamesA/hisense-menu-board/main/data.json",

  PRODUCTS_PER_PAGE: 12,     // products per category page
  PAGE_SECONDS:      14,     // seconds each page is shown
  REFETCH_MINUTES:   5,      // background data refresh interval

  // Category display order. Use the EXACT category names from the sheet's
  // "Product Category" column (col V). Anything not listed still shows — it
  // just appears afterwards, in the order it first appears in the sheet.
  // Matching is case-insensitive and ignores surrounding whitespace.
  CATEGORY_ORDER: [
    "Televisions",
    "Television - Toshiba",
    "Television - Amcon",
    "Air Conditioners",
    "Refrigerator",
    "Chest Freezers",
    "Upright Freezers",
    "Showcase Freezers",
    "Showcase Fridges",
    "Washing Machines",
    "Sound Systems",
    "Water Dispensors",
    "Blenders",
    "Kettles",
    "Toasters"
  ],

  // Insert a FEATURED DEAL spotlight page after each category block,
  // for the first product in that category that has Features filled in.
  ENABLE_SPOTLIGHT: true,

  CURRENCY: "GH₵",
  VALID_TEXT: "VALID JUNE 2026 · INCLUSIVE OF VAT"
};

/* ============================================================
   STATE
   ============================================================ */
let PAGES = [];          // array of page descriptors (the rotation)
let pageIndex = 0;       // index into PAGES of the currently shown page
let rotateTimer = null;
let firstLoadDone = false;
const safeEl    = document.getElementById('safe');
const loadingEl = document.getElementById('loading');
const statusEl  = document.getElementById('status');

/* ============================================================
   HELPERS
   ============================================================ */
const norm = s => (s == null ? "" : String(s)).trim();
const normKey = s => norm(s).toLowerCase();

// Parse a price-ish string into a number (strip GH₵, commas, spaces).
function toNumber(v) {
  if (v == null) return null;
  const cleaned = String(v).replace(/gh₵/ig, "").replace(/[, ]/g, "").trim();
  if (cleaned === "") return null;
  const n = parseFloat(cleaned);
  return isNaN(n) ? null : n;
}

// "26000" -> "GH₵26,000"
function money(n) {
  if (n == null) return "";
  const rounded = Math.round(n);
  return CONFIG.CURRENCY + rounded.toLocaleString("en-US");
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]
  ));
}

/* ============================================================
   DATA → PAGES
   ============================================================ */
function buildPages(rawProducts) {
  // The Apps Script feed already returns clean objects:
  //   { category, name, model, regular(number|null), sale(number|null), features }
  // Normalise defensively in case any field is missing.
  const products = (rawProducts || [])
    .filter(p => p && norm(p.name))
    .map(p => ({
      category: norm(p.category) || "Other",
      name:     norm(p.name),
      model:    norm(p.model),
      regular:  (typeof p.regular === "number") ? p.regular : toNumber(p.regular),
      sale:     (typeof p.sale === "number") ? p.sale : toNumber(p.sale),
      features: norm(p.features)
    }));

  // Group by category, preserving feed order of both categories & items
  const groups = new Map();   // categoryKey -> { name, items: [] }
  products.forEach(p => {
    const key = normKey(p.category);
    if (!groups.has(key)) groups.set(key, { name: p.category, items: [] });
    groups.get(key).items.push(p);
  });

  // 3) Order categories: configured order first, then sheet order
  const orderedKeys = [];
  CONFIG.CATEGORY_ORDER.forEach(c => {
    const k = normKey(c);
    if (groups.has(k)) orderedKeys.push(k);
  });
  groups.forEach((_, k) => { if (!orderedKeys.includes(k)) orderedKeys.push(k); });

  // 4) Build pages
  const per = Math.max(1, CONFIG.PRODUCTS_PER_PAGE);
  const pages = [];

  orderedKeys.forEach(key => {
    const grp = groups.get(key);
    const items = grp.items;
    const totalPages = Math.ceil(items.length / per);

    for (let p = 0; p < totalPages; p++) {
      const slice = items.slice(p * per, p * per + per);
      // rank is the global rank within the category (#1, #2 ...)
      const ranked = slice.map((it, i) => ({ ...it, rank: p * per + i + 1 }));
      pages.push({
        type: "grid",
        category: grp.name,
        pageNo: p + 1,
        pageCount: totalPages,
        items: ranked
      });
    }

    // 5) Spotlight after the category block
    if (CONFIG.ENABLE_SPOTLIGHT) {
      const feat = items.find(it => it.features && it.features.length > 0);
      if (feat) pages.push({ type: "spotlight", category: grp.name, product: feat });
    }
  });

  return pages;
}

/* ============================================================
   RENDERING
   ============================================================ */
function renderGridPage(page) {
  const cards = page.items.map(it => {
    const hasSale = it.sale != null && it.regular != null && it.sale < it.regular;
    let priceHtml;
    if (hasSale) {
      priceHtml = `
        <div class="price-was">${money(it.regular)}</div>
        <div class="price-now is-sale"><span class="cur">${CONFIG.CURRENCY}</span>${Math.round(it.sale).toLocaleString("en-US")}</div>`;
    } else {
      const shown = it.regular != null ? it.regular : it.sale;
      priceHtml = `<div class="price-now"><span class="cur">${CONFIG.CURRENCY}</span>${shown != null ? Math.round(shown).toLocaleString("en-US") : "&mdash;"}</div>`;
    }
    return `
      <div class="card">
        <div class="rank">#${it.rank}</div>
        <div class="card-body">
          <div class="card-name">${escapeHtml(it.name)}</div>
          ${it.model ? `<div class="card-model">${escapeHtml(it.model)}</div>` : ""}
        </div>
        <div class="price-block">${priceHtml}</div>
      </div>`;
  }).join("");

  return `
    <div class="header">
      <div class="wordmark">Hisense<span class="dot">.</span></div>
      <div class="header-divider"></div>
      <div class="category-name">${escapeHtml(page.category)}</div>
      <div class="header-meta">
        <div class="m1">ALL PRICES IN ${CONFIG.CURRENCY}</div>
        <div class="m2">${escapeHtml(CONFIG.VALID_TEXT)}</div>
      </div>
    </div>
    <div class="grid-wrap"><div class="grid">${cards}</div></div>
    <div class="footer">
      <div class="progress">${escapeHtml(page.category.toUpperCase())} · PAGE <b>${page.pageNo}</b> OF <b>${page.pageCount}</b></div>
      <div class="terms">WHILE STOCKS LAST · 2-YEAR WARRANTY</div>
    </div>`;
}

function renderSpotlightPage(page) {
  const it = page.product;
  const feats = it.features.split("|").map(f => norm(f)).filter(Boolean);
  const featHtml = feats.map(f =>
    `<div class="spot-feature"><span class="check">✓</span><span>${escapeHtml(f)}</span></div>`
  ).join("");

  const hasSale = it.sale != null && it.regular != null && it.sale < it.regular;
  const nowVal = hasSale ? it.sale : (it.regular != null ? it.regular : it.sale);
  const save = hasSale ? (it.regular - it.sale) : null;

  return `
    <div class="header">
      <div class="wordmark">Hisense<span class="dot">.</span></div>
      <div class="header-divider"></div>
      <div class="category-name">FEATURED DEAL</div>
      <div class="header-meta">
        <div class="m1">ALL PRICES IN ${CONFIG.CURRENCY}</div>
        <div class="m2">${escapeHtml(CONFIG.VALID_TEXT)}</div>
      </div>
    </div>
    <div class="spot">
      <div class="spot-visual">
        <div class="spot-tag">${escapeHtml(page.category)}</div>
        <div class="ghost">${escapeHtml(it.model || it.name)}</div>
      </div>
      <div class="spot-info">
        <div class="spot-name">${escapeHtml(it.name)}</div>
        ${it.model ? `<div class="spot-model">${escapeHtml(it.model)}</div>` : ""}
        <div class="spot-features">${featHtml}</div>
        <div class="spot-price-row">
          ${hasSale ? `<div class="spot-was">${money(it.regular)}</div>` : ""}
          <div class="spot-now"><span class="cur">${CONFIG.CURRENCY}</span>${nowVal != null ? Math.round(nowVal).toLocaleString("en-US") : "&mdash;"}</div>
        </div>
        ${save != null ? `<div class="spot-save">SAVE ${money(save)}</div>` : ""}
      </div>
    </div>
    <div class="footer">
      <div class="progress">${escapeHtml(page.category.toUpperCase())} · <b>FEATURED</b></div>
      <div class="terms">WHILE STOCKS LAST · 2-YEAR WARRANTY</div>
    </div>`;
}

function renderPageHtml(page) {
  return page.type === "spotlight" ? renderSpotlightPage(page) : renderGridPage(page);
}

/* ============================================================
   ROTATION
   We keep two .page layers and crossfade between them so updated
   data can swap in without a flash.
   ============================================================ */
function showPage(idx) {
  if (!PAGES.length) return;
  pageIndex = ((idx % PAGES.length) + PAGES.length) % PAGES.length;

  const incoming = document.createElement('div');
  incoming.className = 'page';
  incoming.innerHTML = renderPageHtml(PAGES[pageIndex]);
  safeEl.appendChild(incoming);

  // force reflow so the opacity transition fires
  void incoming.offsetWidth;
  incoming.classList.add('is-active');

  // remove any older page layers after the fade
  const layers = safeEl.querySelectorAll('.page');
  layers.forEach(l => {
    if (l !== incoming) {
      l.classList.remove('is-active');
      setTimeout(() => { if (l.parentNode) l.parentNode.removeChild(l); }, 800);
    }
  });
}

function startRotation() {
  if (rotateTimer) clearInterval(rotateTimer);
  rotateTimer = setInterval(() => {
    showPage(pageIndex + 1);
  }, CONFIG.PAGE_SECONDS * 1000);
}

/* ============================================================
   FETCH + APPLY
   ============================================================ */
function fetchData(isFirst) {
  if (!CONFIG.DATA_URL || CONFIG.DATA_URL.indexOf("PASTE") !== -1) {
    statusEl.textContent = "⚠ Set CONFIG.DATA_URL";
    statusEl.classList.add('warn');
    if (isFirst) {
      loadingEl.querySelector('.sub').textContent = "Set your data feed URL in CONFIG";
    }
    return;
  }

  // Cache-bust so the TV always pulls the freshest mirrored JSON.
  const sep = CONFIG.DATA_URL.indexOf("?") === -1 ? "?" : "&";
  const url = CONFIG.DATA_URL + sep + "_cb=" + Date.now();

  fetch(url, { cache: "no-store" })
    .then(r => {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(payload => {
      // Accept either the wrapped feed { ok, products } or a bare array.
      const products = Array.isArray(payload) ? payload
                     : (payload && payload.products) ? payload.products : null;
      if (!products || (payload && payload.ok === false)) {
        throw new Error(payload && payload.error ? payload.error : "bad payload");
      }
      const pages = buildPages(products);
      if (!pages.length) {
        if (!firstLoadDone) {
          loadingEl.querySelector('.sub').textContent = "No active products found";
        }
        statusEl.textContent = "⚠ Feed returned no products";
        statusEl.classList.add('warn');
        return;
      }
      applyPages(pages, isFirst);
      statusEl.classList.remove('warn');
      statusEl.textContent = "● live";
    })
    .catch(err => {
      console.error("menu feed failed:", err);
      statusEl.textContent = "⚠ Feed unreachable (showing last data)";
      statusEl.classList.add('warn');
      if (isFirst && !firstLoadDone) {
        loadingEl.querySelector('.sub').textContent = "Cannot reach data feed — retrying…";
      }
    });
}

function applyPages(pages, isFirst) {
  const wasEmpty = PAGES.length === 0;
  PAGES = pages;

  // Keep the rotation position sensible after a data change.
  if (pageIndex >= PAGES.length) pageIndex = 0;

  if (wasEmpty) {
    // first time we have data
    showPage(0);
    startRotation();
  }
  // If not empty: we simply let the current page finish; the next
  // rotation tick renders from the new PAGES array. No flash.

  if (isFirst && !firstLoadDone) {
    firstLoadDone = true;
    loadingEl.classList.add('hide');
    setTimeout(() => { loadingEl.style.display = 'none'; }, 700);
  }
}

/* ============================================================
   SCALING — fit the 1920x1080 stage into any viewport
   ============================================================ */
function scaleStage() {
  const stage = document.getElementById('stage');
  const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  stage.style.transform = "scale(" + scale + ")";
}
window.addEventListener('resize', scaleStage);

/* ============================================================
   BOOT
   ============================================================ */
scaleStage();
fetchData(true);
setInterval(() => fetchData(false), CONFIG.REFETCH_MINUTES * 60 * 1000);

// If the very first fetch failed before we had data, keep retrying
// more aggressively until we get something on screen.
const bootRetry = setInterval(() => {
  if (firstLoadDone || PAGES.length) { clearInterval(bootRetry); return; }
  fetchData(true);
}, 15000);
</script>
</body>
</html>
